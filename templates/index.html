<!DOCTYPE html>
<html>
<head>
    <title>Emotion-Aware Quote System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 90%;
            height: 100px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f4f4f4;
        }

        .emotion {
            font-size: 22px;
            font-weight: bold;
            color: #764ba2;
        }

        .quote {
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <h1>💬 Emotion-Aware Quote System</h1>

    <div class="container">

        <form method="POST">
            <textarea name="text" placeholder="How are you feeling today?"></textarea>
            <br>
            <button type="submit">Analyze Emotion</button>
        </form>

        {% if result %}
        <div class="result">
            <div class="emotion">
            Emotion: {{ emotion }}
            {% if emotion == "happy" %} 
            {% elif emotion == "sad" %} 
            {% elif emotion == "angry" %}
            {% elif emotion == "fear" %} 
            {% elif emotion == "surprise" %} 
            {% endif %}
        </div>
            <div class="quote">"{{ result }}"</div>
        </div>
        {% endif %}

    </div>

</body>
</html>
